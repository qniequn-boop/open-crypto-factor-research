name: Reproducibility CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python 3.11 reproducibility baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.txt

      - name: Run full test suite
        id: pytest
        continue-on-error: true
        run: python -m pytest -q --junitxml=test-results.xml

      - name: Publish and verify test baseline
        if: always()
        run: python .github/scripts/ci_test_summary.py test-results.xml CURRENT_BASELINE.json
